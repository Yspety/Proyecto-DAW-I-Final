<div class="min-h-screen flex bg-[#EEF2F8]">

  <!-- Panel izquierdo (brand) -->
  <div class="w-[42%] bg-[#1B2A4A] flex flex-col justify-center items-start px-14 py-12 relative overflow-hidden max-md:hidden">
    <!-- Círculos decorativos -->
    <div class="absolute w-80 h-80 rounded-full border border-[rgba(91,155,213,0.18)] -top-20 -right-20 pointer-events-none"></div>
    <div class="absolute w-48 h-48 rounded-full border border-[rgba(91,155,213,0.12)] bottom-16 -left-16 pointer-events-none"></div>
    <div class="absolute w-24 h-24 rounded-full bg-[rgba(91,155,213,0.06)] top-1/3 right-12 pointer-events-none"></div>

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-10">
      <div class="w-12 h-12 bg-[#2D4A8A] rounded-xl flex items-center justify-center shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8EEF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div>
        <div class="text-[18px] font-semibold text-[#E8EEF8] leading-tight">Distribuidora Andina</div>
        <div class="text-[11px] text-[#5B9BD5] uppercase tracking-widest">S.A.C.</div>
      </div>
    </div>

    <!-- Headline -->
    <h1 class="text-[28px] font-semibold text-[#E8EEF8] leading-tight mb-2">
      Sistema de Gestión<br>de Inventario
    </h1>
    <p class="text-[14px] text-[#8FA8D0] mb-10 leading-relaxed">
      Controla almacenes, productos y movimientos desde una sola plataforma.
    </p>

    <!-- Features -->
    <ul class="flex flex-col gap-3 list-none p-0 m-0">
      @for (f of features; track f.label) {
        <li class="flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full bg-[#5B9BD5] shrink-0"></div>
          <span class="text-[13px] text-[#8FA8D0]">{{ f.label }}</span>
        </li>
      }
    </ul>
  </div>

  <!-- Panel derecho (formulario) -->
  <div class="flex-1 flex justify-center items-center p-8 bg-[#EEF2F8]">
    <div class="bg-white rounded-2xl border border-[#D3D1C7] p-10 w-full max-w-[400px] shadow-sm">

      <!-- Cabecera -->
      <div class="mb-8 text-center">
        <div class="w-12 h-12 bg-[#2D4A8A] rounded-xl flex items-center justify-center mx-auto mb-4">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8EEF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 class="text-[22px] font-semibold text-[#1B2A4A]">Iniciar Sesión</h2>
        <p class="text-[13px] text-[#888780] mt-1">Ingresa tus credenciales para continuar</p>
      </div>

      <!-- Alerta de error -->
      @if (error()) {
        <div class="flex items-center justify-between gap-2.5 bg-[#FCEBEB] border border-[#F09595] text-[#A32D2D] rounded-lg px-4 py-3 mb-5 text-[13px]">
          <div class="flex items-center gap-2">
            <svg class="shrink-0" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error() }}
          </div>
          <button (click)="error.set('')" class="text-[#A32D2D] opacity-60 hover:opacity-100 border-none bg-transparent cursor-pointer text-lg leading-none shrink-0">&times;</button>
        </div>
      }

      <!-- Formulario -->
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-4">
          <label class="block text-[13px] font-medium text-[#444441] mb-1.5">Usuario</label>
          <input type="text" formControlName="usuario"
                 class="w-full h-[42px] px-3.5 py-2.5 text-sm text-[#2C2C2A] bg-[#F5F7FA] border border-[#D3D1C7] rounded-lg placeholder:text-[#B4B2A9] focus:outline-none focus:bg-white focus:border-[#5B9BD5] transition-colors"
                 placeholder="Ingresa tu usuario" autofocus autocomplete="username">
        </div>

        <div class="mb-6">
          <label class="block text-[13px] font-medium text-[#444441] mb-1.5">Contraseña</label>
          <input type="password" formControlName="password"
                 class="w-full h-[42px] px-3.5 py-2.5 text-sm text-[#2C2C2A] bg-[#F5F7FA] border border-[#D3D1C7] rounded-lg placeholder:text-[#B4B2A9] focus:outline-none focus:bg-white focus:border-[#5B9BD5] transition-colors"
                 placeholder="Ingresa tu contraseña" autocomplete="current-password">
        </div>

        <button type="submit" [disabled]="cargando()"
                class="w-full h-[44px] bg-[#2D4A8A] text-[#E8EEF8] text-sm font-medium rounded-lg border-none cursor-pointer transition-colors hover:bg-[#1B2A4A] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          @if (cargando()) {
            <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
            Validando...
          } @else {
            Ingresar
          }
        </button>
      </form>

    </div>
  </div>

</div>
