spring.application.name=Distribuidora_Andina_sac
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_productos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:db/schema-postgresql.sql
spring.sql.init.data-locations=classpath:db/data-postgresql.sql
spring.sql.init.continue-on-error=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
