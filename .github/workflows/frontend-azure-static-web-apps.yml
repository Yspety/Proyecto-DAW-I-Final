name: Deploy frontend to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'inventory-management-angular-frontend-main(1)/inventory-management-angular-frontend-main/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set backend URL in Angular production environment
        run: |
          sed -i "s#https://<tu-backend-app-service>.azurewebsites.net#${{ secrets.AZURE_BACKEND_URL }}#g" "inventory-management-angular-frontend-main(1)/inventory-management-angular-frontend-main/src/environments/environment.production.ts"
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: inventory-management-angular-frontend-main(1)/inventory-management-angular-frontend-main
          output_location: dist/frontend-angular/browser
          app_build_command: npm run build -- --configuration production
