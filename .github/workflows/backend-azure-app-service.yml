name: Deploy backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'inventory-management-api-springboot-main(2)/inventory-management-api-springboot-main/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-management-api-springboot-main(2)/inventory-management-api-springboot-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: chmod +x mvnw && ./mvnw clean package -DskipTests
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: inventory-management-api-springboot-main(2)/inventory-management-api-springboot-main/target/*.jar
