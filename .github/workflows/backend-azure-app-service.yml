name: Deploy backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-azure-app-service.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/inventory-management-api-springboot-main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: backend/inventory-management-api-springboot-main/pom.xml

      - name: Build with Maven
        run: |
          chmod +x mvnw || true
          if [ -f "./mvnw" ]; then
            ./mvnw clean package -DskipTests
          else
            mvn clean package -DskipTests
          fi

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: andina-backend
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend/inventory-management-api-springboot-main/target/*.jar
