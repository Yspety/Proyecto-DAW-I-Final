<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body>

<div th:replace="fragments/header :: navbar"></div>
<link rel="stylesheet" th:href="@{/css/categorias.css}">

<main class="erp-page">

  <!-- Alertas -->
  <div th:if="${mensaje}" class="erp-alert erp-alert-success" role="alert">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M20 6L9 17l-5-5"/></svg>
    <span th:text="${mensaje}"></span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Cerrar"></button>
  </div>
  <div th:if="${error}" class="erp-alert erp-alert-danger" role="alert">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Cerrar"></button>
  </div>

  <!-- Cabecera -->
  <div class="erp-page-header">
    <div>
      <h1 class="erp-page-title">Categorías</h1>
      <p class="erp-page-subtitle">Gestión de categorías de productos</p>
    </div>
    <button type="button" class="erp-btn-primary" data-bs-toggle="modal" data-bs-target="#modalCategoria" onclick="limpiarFormulario()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva Categoría
    </button>
  </div>

  <!-- Card principal -->
  <div class="erp-card">

    <!-- Toolbar -->
    <div class="erp-table-toolbar">
      <div class="erp-search-wrapper">
        <svg class="erp-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="erp-search-input" placeholder="Buscar por nombre o descripción..." onkeyup="filtrarTabla()">
        <button class="erp-search-clear" type="button" onclick="document.getElementById('searchInput').value=''; filtrarTabla();">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <span class="erp-record-count">
        Total: <strong id="totalRegistros" th:text="${#lists.size(lstCategorias)}">0</strong>
      </span>
    </div>

    <!-- Tabla -->
    <div class="erp-table-responsive">
      <table class="erp-table" id="tablaCategorias">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Última actualización</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(lstCategorias)}">
            <td colspan="6" class="erp-table-empty">No hay categorías registradas</td>
          </tr>
          <tr th:each="categoria : ${lstCategorias}">
            <td class="erp-td-id" th:text="${categoria.id}">1</td>
            <td class="erp-td-name" th:text="${categoria.nombre}">Bebidas</td>
            <td class="erp-td-desc" th:text="${categoria.descripcion}">Productos líquidos</td>
            <td>
              <span th:if="${categoria.activo}" class="erp-badge erp-badge-success">Activo</span>
              <span th:unless="${categoria.activo}" class="erp-badge erp-badge-danger">Inactivo</span>
            </td>
            <td class="erp-td-date" th:text="${#temporals.format(categoria.ultimaActualizacion, 'dd/MM/yyyy HH:mm')}">31/10/2025 10:00</td>
            <td class="erp-td-actions">
              <button class="erp-action-btn erp-action-btn--edit btn-editar"
                      th:data-id="${categoria.id}"
                      th:data-nombre="${categoria.nombre}"
                      th:data-descripcion="${categoria.descripcion}"
                      th:data-activo="${categoria.activo}"
                      data-bs-toggle="modal"
                      data-bs-target="#modalCategoria">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Editar
              </button>
              <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}"
                 class="erp-action-btn erp-action-btn--delete"
                 onclick="return confirm('¿Está seguro de eliminar esta categoría?')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                Eliminar
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- Modal Crear/Editar -->
<div class="modal fade" id="modalCategoria" tabindex="-1" aria-labelledby="modalCategoriaLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content erp-modal-content">

      <form id="formCategoria" th:action="@{/categorias/guardar}" method="post">

        <div class="erp-modal-header">
          <h5 class="erp-modal-title" id="modalCategoriaLabel">Nueva Categoría</h5>
          <button type="button" class="btn-close erp-modal-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="erp-modal-body">
          <input type="hidden" id="categoriaId" name="id">

          <div class="erp-field">
            <label for="nombre" class="erp-form-label">Nombre <span class="erp-required">*</span></label>
            <input type="text" class="erp-form-control" id="nombre" name="nombre" required maxlength="80" placeholder="Ej: Bebidas">
          </div>

          <div class="erp-field">
            <label for="descripcion" class="erp-form-label">Descripción</label>
            <textarea class="erp-form-control erp-textarea" id="descripcion" name="descripcion" rows="3" maxlength="255" placeholder="Descripción opcional de la categoría"></textarea>
          </div>

          <div class="erp-field">
            <div class="form-check form-switch mb-0">
              <input class="form-check-input erp-switch" type="checkbox" id="activo" name="activo" checked>
              <span class="erp-switch-text">Categoría activa</span>
            </div>
          </div>
        </div>

        <div class="erp-modal-footer">
          <button type="button" class="erp-btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="erp-btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Guardar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
  function filtrarTabla() {
    const filter = document.getElementById('searchInput').value.toUpperCase();
    const tr = document.getElementById('tablaCategorias').getElementsByTagName('tr');
    let count = 0;
    for (let i = 1; i < tr.length; i++) {
      const tdNombre = tr[i].getElementsByTagName('td')[1];
      const tdDesc   = tr[i].getElementsByTagName('td')[2];
      if (tdNombre && tdDesc) {
        const match =
          tdNombre.textContent.toUpperCase().includes(filter) ||
          tdDesc.textContent.toUpperCase().includes(filter);
        tr[i].style.display = match ? '' : 'none';
        if (match) count++;
      }
    }
    document.getElementById('totalRegistros').textContent = count;
  }

  function limpiarFormulario() {
    document.getElementById('formCategoria').action = '/categorias/guardar';
    document.getElementById('modalCategoriaLabel').textContent = 'Nueva Categoría';
    document.getElementById('categoriaId').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('activo').checked = true;
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.btn-editar').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const id          = this.getAttribute('data-id');
        const nombre      = this.getAttribute('data-nombre');
        const descripcion = this.getAttribute('data-descripcion');
        const activo      = this.getAttribute('data-activo') === 'true';

        document.getElementById('formCategoria').action = '/categorias/actualizar';
        document.getElementById('modalCategoriaLabel').textContent = 'Editar Categoría';
        document.getElementById('categoriaId').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('descripcion').value = descripcion || '';
        document.getElementById('activo').checked = activo;
      });
    });

    setTimeout(function () {
      document.querySelectorAll('.erp-alert').forEach(function (el) {
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      });
    }, 5000);
  });
</script>

</body>
</html>
