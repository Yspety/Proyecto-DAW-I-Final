<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} ?: 'Distribuidora Andina S.A.C.'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
</head>

<body th:fragment="navbar">
  <nav class="navbar navbar-expand-lg erp-navbar">
    <div class="container-fluid erp-navbar-inner">

      <!-- Logo -->
      <a class="navbar-brand erp-navbar-brand" th:href="@{/home}">
        <div class="erp-navbar-logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-9 8H7v-2h4v2zm6 0h-4v-2h4v2zM3 5h18v2H3z"/>
          </svg>
        </div>
        <div>
          <div class="erp-navbar-brand-name">Distribuidora Andina</div>
          <div class="erp-navbar-brand-sub">S.A.C. — ERP</div>
        </div>
      </a>

      <!-- Toggler Bootstrap nativo con estilo custom -->
      <button class="navbar-toggler erp-navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="erp-toggler-bar"></span>
        <span class="erp-toggler-bar"></span>
        <span class="erp-toggler-bar"></span>
      </button>

      <!-- Contenido colapsable -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <!-- Links -->
        <ul class="navbar-nav me-auto erp-navbar-nav">
          <li class="nav-item dropdown erp-nav-item">
            <a class="nav-link dropdown-toggle erp-nav-link" data-bs-toggle="dropdown" href="#" role="button">
              Mantenimientos
            </a>
            <ul class="dropdown-menu erp-dropdown-menu">
              <li><a class="dropdown-item erp-dropdown-item" th:href="@{/categorias}">Categorías</a></li>
              <li><a class="dropdown-item erp-dropdown-item" th:href="@{/unidades}">Unidades</a></li>
              <li><a class="dropdown-item erp-dropdown-item" th:href="@{/productos}">Productos</a></li>
              <li th:if="${session.rol == 'ADMIN'}"><hr class="dropdown-divider erp-dropdown-divider"></li>
              <li th:if="${session.rol == 'ADMIN'}">
                <a class="dropdown-item erp-dropdown-item" th:href="@{/usuarios}">Usuarios</a>
              </li>
            </ul>
          </li>
          <li class="nav-item erp-nav-item">
            <a class="nav-link erp-nav-link" th:href="@{/transacciones}">Transacciones</a>
          </li>
        </ul>

        <!-- Usuario + logout -->
        <div class="erp-navbar-user">
          <div class="erp-user-info">
            <div class="erp-user-avatar">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
            </div>
            <div>
              <div class="erp-user-name" th:text="${session.nombreCompleto} ?: 'Usuario'"></div>
              <div class="erp-user-role" th:text="${session.rol} ?: 'ROL'"></div>
            </div>
          </div>
          <a th:href="@{/logout}" class="erp-btn-logout">Salir</a>
        </div>

      </div>
    </div>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
